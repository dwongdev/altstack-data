version: '3.8'

services:
  code-llama-13b:
    image: bitnami/python:3.10
    container_name: code-llama-13b
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config
      - code-llama-13b_data:/app

volumes:
  code-llama-13b_data:
