version: '3.8'

services:
  llama:
    image: bitnami/python:3.9
    container_name: llama-3-1-8b
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - llama_data:/app

volumes:
  llama_data:
