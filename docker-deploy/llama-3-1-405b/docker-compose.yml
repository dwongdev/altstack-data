version: '3.8'

services:
  llama:
    image: bitnami/pytorch:latest
    container_name: llama-3-1-405b
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - WANDB_DISABLED=true
    volumes:
      - llama_data:/app/data

volumes:
  llama_data:
