version: '3.8'

services:
  jan:
    image: linuxserver/jan
    container_name: jan
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config

volumes:
  jan_config:
