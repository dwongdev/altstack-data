version: '3.8'

services:
  gemma:
    image: huggingface/transformers-pytorch-gpu
    container_name: gemma-2-27b
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=gemma-2-27b
      - MODEL_TYPE=transformers
    volumes:
      - gemma_data:/app/data

volumes:
  gemma_data:
