version: '3.8'

services:
  qwen-2-5-14b:
    image: huggingface/transformers-pytorch-gpu:latest
    container_name: qwen-2-5-14b
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MODEL_NAME=qwen-2-5-14b
      - MODEL_TYPE=transformer
      - DEVICE=cpu
    volumes:
      - qwen_data:/app/data

volumes:
  qwen_data:
