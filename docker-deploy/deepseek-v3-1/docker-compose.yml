version: '3.8'

services:
  deepseek-v3-1:
    image: huggingface/transformers-pytorch-gpu
    container_name: deepseek-v3-1
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config
      - deepseek-v3-1_data:/data

volumes:
  deepseek-v3-1_data:
