version: '3.8'

services:
  gemma-2-2b:
    image: huggingface/transformers-pytorch-gpu
    container_name: gemma-2-2b
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - MODEL_NAME=gemma-2-2b
      - MODEL_TYPE=transformers
    volumes:
      - gemma_2_2b_data:/app/model

volumes:
  gemma_2_2b_data:
