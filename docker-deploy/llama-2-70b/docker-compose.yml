version: '3.8'

services:
  llama-2-70b:
    image: bitnami/pytorch:latest
    container_name: llama-2-70b
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config
      - llama_2_70b_data:/data

volumes:
  llama_2_70b_data:
