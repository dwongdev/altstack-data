version: '3.8'

services:
  llama:
    image: bitnami/python:3.9
    container_name: llama-3-1-70b
    restart: unless-stopped
    command: pip install -r requirements.txt && python app.py
    ports:
      - "5000:5000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config
      - llama_data:/data

volumes:
  llama_data:
