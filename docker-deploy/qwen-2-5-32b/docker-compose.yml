version: '3.8'

services:
  qwen-2-5-32b:
    image: nvcr.io/nvidia/pytorch:22.08-py3
    container_name: qwen-2-5-32b
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config
      - ./data:/data

volumes:
  config:
  data:
