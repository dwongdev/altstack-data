version: '3.8'

services:
  llama-2-13b:
    image: bitnami/python:3.10
    container_name: llama-2-13b
    restart: unless-stopped
    command: pip install -r requirements.txt && python app.py
    ports:
      - "5000:5000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config
      - llama_2_13b_data:/app/data

volumes:
  llama_2_13b_data:
