version: '3.8'

services:
  open:
    image: python:3.10
    container_name: open
    restart: unless-stopped
    command: pip install -r requirements.txt && python main.py
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - open_data:/app

volumes:
  open_data:
