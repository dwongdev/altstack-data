version: '3.8'

services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - filebrowser_data:/srv

volumes:
  filebrowser_data:
