version: '3.8'

services:
  garage:
    image: ghcr.io/deuxfleurs-org/garage:latest
    container_name: garage
    restart: unless-stopped
    ports:
      - "3900:3900"
    environment:
      - RUST_LOG=info
      - GARAGE_ENDPOINT=http://localhost:3900

