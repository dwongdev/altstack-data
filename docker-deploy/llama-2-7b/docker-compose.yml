version: '3.8'

services:
  llama-2-7b:
    image: bitnami/python:3.10
    container_name: llama-2-7b
    restart: unless-stopped
    command: pip install transformers && python -m transformers.serve --model llama-2-7b --port 5000
    ports:
      - "5000:5000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config
      - llama_2_7b_data:/data

volumes:
  llama_2_7b_data:
