version: '3.8'

services:
  firnflow:
    image: rust:latest
    container_name: firnflow
    restart: unless-stopped
    command: cargo run
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
    volumes:
      - firnflow_data:/data

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data

volumes:
  firnflow_data:
  minio_data:
