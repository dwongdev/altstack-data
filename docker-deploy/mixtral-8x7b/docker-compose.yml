version: '3.8'

services:
  mixtral-8x7b:
    image: huggingface/transformers-pytorch-gpu:latest
    container_name: mixtral-8x7b
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=mixtral-8x7b
      - MODEL_TYPE=bert
    volumes:
      - mixtral_8x7b_data:/app/data

volumes:
  mixtral_8x7b_data:
