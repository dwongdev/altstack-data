version: '3.8'

services:
  code-llama-7b:
    image: bitnami/python:3.10
    container_name: code-llama-7b
    restart: unless-stopped
    command: python -m http.server 5000
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - code_llama_7b_data:/app

volumes:
  code_llama_7b_data:
