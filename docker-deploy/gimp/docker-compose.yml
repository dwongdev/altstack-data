version: '3.8'

services:
  gimp:
    image: linuxserver/gimp:latest
    container_name: gimp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config

