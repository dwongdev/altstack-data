version: '3.8'

services:
  gemma-3:
    image: google/gemma-3:latest
    container_name: gemma-3
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config
      - gemma_3_data:/data

volumes:
  gemma_3_data:
