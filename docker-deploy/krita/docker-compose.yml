version: '3.8'

services:
  krita:
    image: linuxserver/krita
    container_name: krita
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./config:/config

